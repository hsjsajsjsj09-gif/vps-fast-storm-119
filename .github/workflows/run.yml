name: Windows NoVNC
on:
  workflow_dispatch:
concurrency:
  group: vps-${{ github.repository }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 375
    steps:
    - uses: actions/checkout@v4
    - name: Set Password
      shell: pwsh
      run: |
        $pw = ConvertTo-SecureString "Vps@PsRvPmPg9" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $pw
    - name: Install TightVNC
      shell: pwsh
      run: |
        curl -L -o vnc.msi https://www.tightvnc.com/download/2.8.63/tightvnc-2.8.63-gpl-setup-64bit.msi
        $msiArgs = @("/i","vnc.msi","/quiet","/norestart","ADDLOCAL=Server","SERVER_REGISTER_AS_SERVICE=1","SET_USEVNCAUTHENTICATION=1","VALUE_OF_USEVNCAUTHENTICATION=1","SET_PASSWORD=1","VALUE_OF_PASSWORD=Vps@PsRvPmPg9")
        Start-Process msiexec.exe -ArgumentList $msiArgs -Wait -NoNewWindow
        Start-Sleep 15
        $regPath = "HKLM:\\SOFTWARE\\TightVNC\\Server"
        Set-ItemProperty -Path $regPath -Name "AllowLoopback" -Value 1 -Type DWord
        Set-ItemProperty -Path $regPath -Name "LoopbackOnly" -Value 0 -Type DWord
        Set-ItemProperty -Path $regPath -Name "AcceptRfbConnections" -Value 1 -Type DWord
        Set-ItemProperty -Path $regPath -Name "AcceptHttpConnections" -Value 1 -Type DWord
        Restart-Service tvnserver -ErrorAction SilentlyContinue
        Start-Sleep 5
    - name: Setup Websockify
      shell: pwsh
      run: |
        pip install websockify -q
        Invoke-WebRequest -Uri "https://github.com/novnc/noVNC/archive/refs/tags/v1.5.0.zip" -OutFile "novnc.zip" -UseBasicParsing
        Expand-Archive novnc.zip . -Force
        if (Test-Path 'noVNC-1.5.0') { Rename-Item 'noVNC-1.5.0' 'noVNC' -Force }
        Start-Process python -ArgumentList "-m","websockify","--web","noVNC","6080","127.0.0.1:5900" -WindowStyle Hidden
        Start-Sleep 5
    - name: Start Tunnel
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cf.exe" -UseBasicParsing
        Start-Process .\\cf.exe -ArgumentList "tunnel","--url","http://localhost:6080","--logfile","cf.log" -WindowStyle Hidden
        Start-Sleep 45
        $url = ''
        for ($i = 0; $i -lt 30; $i++) {
          if (Test-Path cf.log) {
            $content = Get-Content cf.log -Raw -ErrorAction SilentlyContinue
            $m = [regex]::Match($content, 'https://[a-zA-Z0-9-]+\.trycloudflare\.com')
            if ($m.Success) { $url = $m.Value; break }
          }
          Start-Sleep 2
        }
        if ($url) { "$url/vnc.html|Vps@PsRvPmPg9" | Out-File info.txt -NoNewline -Encoding UTF8 }
        else { "ERROR|Tunnel not found" | Out-File info.txt -NoNewline -Encoding UTF8 }
    - uses: actions/upload-artifact@v4
      with:
        name: result
        path: info.txt
    - name: Keep Alive
      shell: pwsh
      run: Start-Sleep -Seconds (350 * 60)